# Duender Sprite toolhead additions for ACE/Happy Hare multicolor
#
# Requirements: cut filament at toolhead → MMU retract → load next color.
# BLTouch uses PB0 (control) + PB1 (sense) — do NOT reuse PB0 for the cutter.
#
# Suggested free pin on Creality 4.2.2 printer MCU for a hobby servo cutter:
#   PA7 = mechanical Z-MIN (unused when Z homes on probe) — VERIFY free with meter
# Alternative: wire cutter to [mcu ace] and use ace:Pxx instead.
#
# Uncomment [include ace_toolhead.cfg] in printer.cfg after hardware is fitted.

# --- Toolhead filament sensor (optical / switch in Bowden or Sprite path) ---
[filament_switch_sensor toolhead_sensor]
# Mechanical Z-MIN (PA7) is free when Z homes on CR Touch — verify nothing else is wired.
switch_pin: ^PA7
pause_on_runout: False
event_delay: 1.0
# pause_on_runout False: Happy Hare owns runout / toolchange. Enable True only
# for simple single-color runout without MMU.

# --- Filament cutter servo (toolhead blade) ---
# Many Sprite/MMU cutters use a 9g servo. Adjust angles to your mechanism.
# Use an EXP1 free pin if PA7 is taken by the sensor — default EXP1_PC6-style:
# Creality V4 EXP1 often exposes PC6 on the LCD connector when LCD is unused.
[servo mmu_cutter]
pin: PC6
# initial_angle: leave docked
initial_angle: 0
maximum_servo_angle: 180
minimum_pulse_width: 0.0005
maximum_pulse_width: 0.0025

[gcode_macro MMU_CUT_FILAMENT]
description: Actuate toolhead cutter servo (tune CUT_ANGLE / PARK_ANGLE)
gcode:
    {% set CUT = params.CUT_ANGLE|default(90)|float %}
    {% set PARK = params.PARK_ANGLE|default(0)|float %}
    {% set DWELL = params.DWELL|default(400)|int %}
    SET_SERVO SERVO=mmu_cutter ANGLE={CUT}
    G4 P{DWELL}
    SET_SERVO SERVO=mmu_cutter ANGLE={PARK}
    G4 P200
    # Release servo to reduce chatter/heat (optional)
    SET_SERVO SERVO=mmu_cutter WIDTH=0
    RESPOND MSG="MMU cutter pulse done (cut={CUT} park={PARK})"

[gcode_macro CUTTER_TEST]
description: Safe test pulse of cutter away from hot nozzle contact checks first
gcode:
    RESPOND MSG="Clear nozzle path, then cutter moves."
    MMU_CUT_FILAMENT CUT_ANGLE={params.CUT_ANGLE|default(90)} PARK_ANGLE={params.PARK_ANGLE|default(0)}
