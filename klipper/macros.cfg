# Duender CoreXY — Klipper print macros for OrcaSlicer
# Sources: Klipper sample-macros.cfg + Mainsail pause stack + Duender purge/present habit
# Mainsail already provides PAUSE / RESUME / CANCEL_PRINT / pause_resume — do not redefine.

######################################################################
# START / END (Orca → Machine G-code)
######################################################################

[gcode_macro START_PRINT]
description: Orca/CoreXY start — heat, home, mesh, purge
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(220)|float %}
    {% set TARGET_X = params.X|default(5)|float %}
    {% set TARGET_Y = params.Y|default(25)|float %}
    # Avoid slicer double-heat races
    M220 S100
    M221 S100
    M140 S{BED_TEMP}
# Warm nozzle while waiting / homing (anti-ooze) — avoid Jinja min on float for older hosts
    {% set WARM = 150 %}
    {% if EXTRUDER_TEMP < WARM %}
        {% set WARM = EXTRUDER_TEMP %}
    {% endif %}
    M104 S{WARM}
    G90
    M83
    G28
    BED_MESH_PROFILE LOAD=default
    G1 Z5 F600
    M190 S{BED_TEMP}
    M109 S{EXTRUDER_TEMP}
    G92 E0
    # Front purge line (inside printable area)
    G1 X{TARGET_X} Y{TARGET_Y} Z0.30 F6000
    G1 X{TARGET_X + 55} Y{TARGET_Y} E8 F1200
    G1 X{TARGET_X + 60} Y{TARGET_Y} F6000
    G92 E0
    G1 E-0.5 F1800
    G1 Z2 F600
    G92 E0

# Alias used by some guides / Voron-style configs
[gcode_macro PRINT_START]
gcode:
    START_PRINT BED_TEMP={params.BED_TEMP|default(params.BED|default(60))} EXTRUDER_TEMP={params.EXTRUDER_TEMP|default(params.EXTRUDER|default(220))}

[gcode_macro END_PRINT]
description: Orca/CoreXY end — retract, present, cool
gcode:
    G91
    G1 E-1 F1800
    G1 Z2 F600
    G90
    # Present front-left (print-area safe)
    G1 X5 Y25 F6000
    M104 S0
    M140 S0
    M106 S0
    M84 X Y E

[gcode_macro PRINT_END]
gcode:
    END_PRINT

######################################################################
# Park / present helpers
######################################################################

[gcode_macro PARK]
description: Raise and move to park
gcode:
    {% set X = params.X|default(5)|float %}
    {% set Y = params.Y|default(25)|float %}
    {% set Z = params.Z|default(10)|float %}
    SAVE_GCODE_STATE NAME=PARK_state
    G91
    G1 Z{Z} F600
    G90
    G1 X{X} Y{Y} F6000
    RESTORE_GCODE_STATE NAME=PARK_state MOVE=0

[gcode_macro PRESENT]
description: Move to front present position
gcode:
    G91
    G1 Z5 F600
    G90
    G1 X5 Y25 F6000

######################################################################
# Filament (Sprite / direct drive — tune lengths if needed)
######################################################################

[gcode_macro LOAD_FILAMENT]
description: Heat and load filament
gcode:
    {% set TEMP = params.TEMP|default(220)|float %}
    {% set LENGTH = params.LENGTH|default(80)|float %}
    M109 S{TEMP}
    G91
    G1 E{LENGTH} F300
    G90
    RESPOND MSG="Filament load done. Trim tip if needed."

[gcode_macro UNLOAD_FILAMENT]
description: Heat, purge briefly, unload filament
gcode:
    {% set TEMP = params.TEMP|default(220)|float %}
    {% set LENGTH = params.LENGTH|default(90)|float %}
    M109 S{TEMP}
    G91
    G1 E10 F300
    G1 E-{LENGTH} F800
    G90
    RESPOND MSG="Filament unload done."

# Klipper sample M600 — uses Mainsail PAUSE
[gcode_macro M600]
description: Filament change (pause + park + retract)
gcode:
    {% set X = params.X|default(5)|float %}
    {% set Y = params.Y|default(25)|float %}
    {% set Z = params.Z|default(10)|float %}
    PAUSE
    G91
    G1 E-0.8 F2700
    G1 Z{Z} F600
    G90
    G1 X{X} Y{Y} F6000
    G91
    G1 E-50 F1000
    G90
    RESPOND MSG="Change filament, then RESUME."
