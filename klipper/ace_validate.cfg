# ACE / Happy Hare MMU bring-up & validation macros
# Safe to include always — does not require ace_mmu hardware until you call the ACE_* macros.

[gcode_macro ACE_MMU_STATUS]
description: Remind bring-up order for ACE mechanics MMU
gcode:
    RESPOND MSG="ACE MMU path: inventory → [mcu ace] → Happy Hare Custom → cutter/sensor → 2-color → 4-color"
    RESPOND MSG="Docs: ace-mechanics-mmu.md | Sensors: ACE_SENSOR_QUERY | Gear: ACE_GEAR_TEST | Cutter: CUTTER_TEST"
    RESPOND MSG="Includes stay commented in printer.cfg until serial+pins are real."

[gcode_macro ACE_VALIDATE_2COLOR]
description: Checklist prompt before first 2-color Orca print
gcode:
    RESPOND MSG="2-color gate check:"
    RESPOND MSG="1) ACE_SENSOR_QUERY — expect gate0+gate1 filament"
    RESPOND MSG="2) Manual HH load gate0 to nozzle, cut, unload, load gate1"
    RESPOND MSG="3) Orca 2-tool purge cube — see slicer/orcaslicer/ACE-MMU-NOTES.md"
    RESPOND MSG="4) If toolchange fails, stop — fix HH param, not purge volume first"

[gcode_macro ACE_VALIDATE_4COLOR]
description: Checklist prompt before 4-color print
gcode:
    RESPOND MSG="4-color only after 2-color is reliable."
    RESPOND MSG="Load gates 0-3, run toolchange soak (HH soak test if available), then Orca 4-tool model."
