# Duender calibrations — macros print stored gcodes under gcodes/calibrations/
# Include from printer.cfg. SAVE_CONFIG still owns live tuned values.

# --- Screws tilt (More → Bed Level) ---
[screws_tilt_adjust]
screw1: 30, 40
screw1_name: front left
screw2: 150, 40
screw2_name: front right
screw3: 150, 180
screw3_name: back right
screw4: 30, 180
screw4_name: back left
horizontal_move_z: 10
speed: 100
screw_thread: CW-M4

# Needed for RETRACTION_CALIBRATE_TOWER / SET_RETRACTION
[firmware_retraction]
retract_length: 0.5
retract_speed: 30
unretract_extra_length: 0
unretract_speed: 30

# ========== Shared print prep ==========

[gcode_macro _CAL_PRINT_PREP]
description: Internal — heat, home, mesh, wait
gcode:
    {% set HOTEND = params.HOTEND|default(220)|float %}
    {% set BED = params.BED|default(60)|float %}
    {% set TITLE = params.TITLE|default("Calibration") %}
    M117 {TITLE} heating
    M140 S{BED|int}
    M104 S{HOTEND|int}
    G28
    BED_MESH_PROFILE LOAD=default
    M190 S{BED|int}
    M109 S{HOTEND|int}
    M117 {TITLE}

# ========== Print calibrations (stored gcode) ==========

[gcode_macro PA_CALIBRATE_TOWER]
description: Heat/home + TUNING_TOWER PA + print calibrations/pa_tower.gcode
gcode:
    {% set HOTEND = params.HOTEND|default(220)|float %}
    {% set BED = params.BED|default(60)|float %}
    {% set FACTOR = params.FACTOR|default(0.005)|float %}
    _CAL_PRINT_PREP HOTEND={HOTEND} BED={BED} TITLE="PA tower"
    SET_PRESSURE_ADVANCE ADVANCE=0 SMOOTH_TIME=0.040
    TUNING_TOWER COMMAND=SET_PRESSURE_ADVANCE PARAMETER=ADVANCE START=0 FACTOR={FACTOR}
    RESPOND MSG="PA: ADVANCE ≈ height_mm * {FACTOR}. Best band → PA_SAVE"
    SDCARD_PRINT_FILE FILENAME=calibrations/pa_tower.gcode

[gcode_macro TEMP_CALIBRATE_TOWER]
description: Temp tower 230→210 (°C) in 10mm bands + print temp_tower.gcode
gcode:
    {% set BED = params.BED|default(60)|float %}
    {% set START = params.START|default(230)|float %}
    {% set FACTOR = params.FACTOR|default(-5)|float %}
    {% set BAND = params.BAND|default(10)|float %}
    _CAL_PRINT_PREP HOTEND={START} BED={BED} TITLE="Temp tower"
    TUNING_TOWER COMMAND="SET_HEATER_TEMPERATURE HEATER=extruder" PARAMETER=TARGET START={START} FACTOR={FACTOR} BAND={BAND}
    RESPOND MSG="Temp tower: START={START} FACTOR={FACTOR}/BAND={BAND}mm. Note best band temp."
    SDCARD_PRINT_FILE FILENAME=calibrations/temp_tower.gcode

[gcode_macro RETRACTION_CALIBRATE_TOWER]
description: Retraction tower (firmware retract) + print retraction_tower.gcode
gcode:
    {% set HOTEND = params.HOTEND|default(220)|float %}
    {% set BED = params.BED|default(60)|float %}
    {% set START = params.START|default(0.2)|float %}
    {% set FACTOR = params.FACTOR|default(0.1)|float %}
    _CAL_PRINT_PREP HOTEND={HOTEND} BED={BED} TITLE="Retraction tower"
    SET_RETRACTION RETRACT_LENGTH={START}
    TUNING_TOWER COMMAND=SET_RETRACTION PARAMETER=RETRACT_LENGTH START={START} FACTOR={FACTOR}
    RESPOND MSG="Retract length ≈ {START} + height_mm * {FACTOR}. Note best band."
    SDCARD_PRINT_FILE FILENAME=calibrations/retraction_tower.gcode

[gcode_macro FLOW_CALIBRATE_WALL]
description: Single-wall flow test print (measure width with calipers)
gcode:
    {% set HOTEND = params.HOTEND|default(220)|float %}
    {% set BED = params.BED|default(60)|float %}
    _CAL_PRINT_PREP HOTEND={HOTEND} BED={BED} TITLE="Flow wall"
    SET_PRESSURE_ADVANCE ADVANCE=0
    RESPOND MSG="Measure wall width mid-height. Target ~0.45mm. Adjust flow%% in slicer."
    SDCARD_PRINT_FILE FILENAME=calibrations/flow_wall.gcode

[gcode_macro FIRST_LAYER_TEST]
description: First-layer square for Z-offset / bed check
gcode:
    {% set HOTEND = params.HOTEND|default(220)|float %}
    {% set BED = params.BED|default(60)|float %}
    _CAL_PRINT_PREP HOTEND={HOTEND} BED={BED} TITLE="First layer"
    RESPOND MSG="Check squish: gaps=too high, mashed=too low. Then PROBE_Z_OFFSET_CALIBRATE if needed."
    SDCARD_PRINT_FILE FILENAME=calibrations/first_layer_square.gcode

[gcode_macro RINGING_CALIBRATE_TOWER]
description: Fast ringing tower (+ optional accel TUNING_TOWER)
gcode:
    {% set HOTEND = params.HOTEND|default(220)|float %}
    {% set BED = params.BED|default(60)|float %}
    {% set ACCEL = params.ACCEL|default(0)|float %}
    _CAL_PRINT_PREP HOTEND={HOTEND} BED={BED} TITLE="Ringing tower"
    {% if ACCEL > 0 %}
    TUNING_TOWER COMMAND=SET_VELOCITY_LIMIT PARAMETER=ACCEL START={ACCEL} FACTOR=100
    RESPOND MSG="Accel TUNING_TOWER START={ACCEL} FACTOR=100. Else print is visual ringing only."
    {% else %}
    RESPOND MSG="Ringing tower at fixed speed. Pass ACCEL=1000 to ramp accel while printing."
    {% endif %}
    SDCARD_PRINT_FILE FILENAME=calibrations/ringing_tower.gcode

[gcode_macro BRIDGE_CALIBRATE_TEST]
description: Short bridge sample print
gcode:
    {% set HOTEND = params.HOTEND|default(220)|float %}
    {% set BED = params.BED|default(60)|float %}
    _CAL_PRINT_PREP HOTEND={HOTEND} BED={BED} TITLE="Bridge test"
    RESPOND MSG="Check bridge sag/stringing. Tune fan/temp/flow in slicer after."
    SDCARD_PRINT_FILE FILENAME=calibrations/bridge_test.gcode

# ========== Filament profile calibrations ==========

[gcode_macro FILAMENT_TEMP_TOWER]
description: Filament temp tower (alias of TEMP_CALIBRATE_TOWER)
gcode:
    TEMP_CALIBRATE_TOWER BED={params.BED|default(60)} START={params.START|default(230)} FACTOR={params.FACTOR|default(-5)} BAND={params.BAND|default(10)}

[gcode_macro FILAMENT_FLOW_WALL]
description: Filament flow single-wall (alias of FLOW_CALIBRATE_WALL)
gcode:
    FLOW_CALIBRATE_WALL HOTEND={params.HOTEND|default(220)} BED={params.BED|default(60)}

[gcode_macro FILAMENT_PA_TOWER]
description: Filament pressure-advance tower (alias of PA_CALIBRATE_TOWER)
gcode:
    PA_CALIBRATE_TOWER HOTEND={params.HOTEND|default(220)} BED={params.BED|default(60)} FACTOR={params.FACTOR|default(0.005)}

[gcode_macro FILAMENT_RETRACTION_TOWER]
description: Filament retraction tower (alias of RETRACTION_CALIBRATE_TOWER)
gcode:
    RETRACTION_CALIBRATE_TOWER HOTEND={params.HOTEND|default(220)} BED={params.BED|default(60)} START={params.START|default(0.2)} FACTOR={params.FACTOR|default(0.1)}

[gcode_macro FILAMENT_STRINGING_TEST]
description: Twin-tower stringing test print
gcode:
    {% set HOTEND = params.HOTEND|default(220)|float %}
    {% set BED = params.BED|default(60)|float %}
    _CAL_PRINT_PREP HOTEND={HOTEND} BED={BED} TITLE="Stringing"
    SET_RETRACTION RETRACT_LENGTH={params.RETRACT|default(0.6)|float}
    RESPOND MSG="Wisps between towers → more retract / dryer filament / cooler temp."
    SDCARD_PRINT_FILE FILENAME=calibrations/filament_stringing.gcode

[gcode_macro FILAMENT_COOLING_TOWER]
description: Fan cooling tower 0→100% in bands
gcode:
    {% set HOTEND = params.HOTEND|default(220)|float %}
    {% set BED = params.BED|default(60)|float %}
    {% set FACTOR = params.FACTOR|default(51)|float %}
    {% set BAND = params.BAND|default(10)|float %}
    _CAL_PRINT_PREP HOTEND={HOTEND} BED={BED} TITLE="Cooling tower"
    M106 S0
    TUNING_TOWER COMMAND=M106 PARAMETER=S START=0 FACTOR={FACTOR} BAND={BAND}
    RESPOND MSG="Fan S ≈ band_index * {FACTOR} (0-255). Note best cooling band."
    SDCARD_PRINT_FILE FILENAME=calibrations/filament_cooling_tower.gcode

[gcode_macro FILAMENT_MAX_FLOW]
description: Increasing speed lines — find max volumetric flow
gcode:
    {% set HOTEND = params.HOTEND|default(220)|float %}
    {% set BED = params.BED|default(60)|float %}
    _CAL_PRINT_PREP HOTEND={HOTEND} BED={BED} TITLE="Max flow"
    SET_PRESSURE_ADVANCE ADVANCE=0
    RESPOND MSG="Note first underextruded speed. mm3/s ≈ 0.45*0.2*(mm/s). Set Max Volumetric in slicer."
    SDCARD_PRINT_FILE FILENAME=calibrations/filament_max_flow.gcode

[gcode_macro FILAMENT_OVERHANG_TEST]
description: Stepped overhang stick-out test
gcode:
    {% set HOTEND = params.HOTEND|default(220)|float %}
    {% set BED = params.BED|default(60)|float %}
    _CAL_PRINT_PREP HOTEND={HOTEND} BED={BED} TITLE="Overhang"
    M106 S255
    RESPOND MSG="Last clean overhang step = practical limit for this filament/fan."
    SDCARD_PRINT_FILE FILENAME=calibrations/filament_overhang.gcode

[gcode_macro TORTURE_TEST]
description: All-in-one printer/quality torture print (walls, overhang, bridge, stringing, tip)
gcode:
    {% set HOTEND = params.HOTEND|default(220)|float %}
    {% set BED = params.BED|default(60)|float %}
    _CAL_PRINT_PREP HOTEND={HOTEND} BED={BED} TITLE="Torture test"
    M106 S255
    RESPOND MSG="Inspect: 1st layer, walls, overhangs, bridge, stringing pillars, fine tip. One print = overall health."
    SDCARD_PRINT_FILE FILENAME=calibrations/torture_test.gcode

# ========== Non-print calibrations ==========

[gcode_macro EXTRUDER_CALIBRATE_100]
description: Extrude 100mm for rotation_distance (mark filament first)
gcode:
    {% set HOTEND = params.HOTEND|default(220)|float %}
    M104 S{HOTEND|int}
    M109 S{HOTEND|int}
    G91
    G1 E100 F120
    G90
    RESPOND MSG="Measure extruded mm. new_rotation_distance = 7.38 * (100 / measured_mm)."

[gcode_macro PA_SAVE]
description: Save current Pressure Advance into printer.cfg
gcode:
    SAVE_CONFIG

[gcode_macro PID_HOTEND]
description: PID calibrate hotend at 220C (Save Config after)
gcode:
    PID_CALIBRATE HEATER=extruder TARGET=220

[gcode_macro PID_BED]
description: PID calibrate bed at 60C (Save Config after)
gcode:
    PID_CALIBRATE HEATER=heater_bed TARGET=60

[gcode_macro PROBE_ACCURACY_TEST]
description: Probe accuracy at current XY (home + move over bed first)
gcode:
    PROBE_ACCURACY

[gcode_macro PROBE_Z_OFFSET_CALIBRATE]
description: Interactive Z offset paper test
gcode:
    PROBE_CALIBRATE
