# ACE Pro Gen1 → Klipper MMU actuators on second MCU (GD32 Neo)
#
# Printer MCU = STM32F103RCT6 (main [mcu])
# ACE MCU     = GD32 Neo flashed with Klipper SD image
#
# Both boards are CH340 with the SAME USB id — use by-path (not by-id):
#   printer: platform-5101400… → ttyUSB1 (temps/motors live)
#   ace:     platform-5200400… → ttyUSB0 (this board)
#
# Do NOT power Anycubic FilamentBox / USBHUB for this path.
# FEED motor → E socket; SEL motor → Z socket. 24V on Neo DC in required to spin.

[mcu ace]
serial: /dev/serial/by-path/platform-5200400.usb-usb-0:1:1.0-port0
restart_method: command

# ---------------------------------------------------------------------------
# FEED / gear — X driver on Neo (PC2 / PB9)  [was E; E driver may be faulting]
# Plug FEED motor into the X socket on the ACE board.
# ---------------------------------------------------------------------------
[manual_stepper mmu_gear]
step_pin: ace:PC2
dir_pin: !ace:PB9
enable_pin: !ace:PC3
microsteps: 16
rotation_distance: 22.678
velocity: 15
accel: 80

# ---------------------------------------------------------------------------
# SEL / selector — Z driver on Neo (PB6/PB5)
# ZERO Hall → Neo **Z-STOP** (PA7). SEL motor still on Z **driver** socket.
# ---------------------------------------------------------------------------
[manual_stepper mmu_selector]
step_pin: ace:PB6
dir_pin: ace:PB5
enable_pin: !ace:PC3
microsteps: 16
rotation_distance: 40
velocity: 20
accel: 100
# ZERO / home sensor → Neo **Z-STOP** sense PA7 (SEL motor still on Z driver).
# Z-STOP is often G+S only — feed sensor **5V from BL_T V** (and G common).
# Plugged=TRIGGERED, unplugged=open means PA7 works; actuate until it goes open while plugged.
endstop_pin: ^!ace:PA7


# ---------------------------------------------------------------------------
# Gate sensors — wire later; pins reserved (pullups OK floating)
# ---------------------------------------------------------------------------
[filament_switch_sensor mmu_gate_0]
switch_pin: ^ace:PA5
pause_on_runout: False
event_delay: 0.5

[filament_switch_sensor mmu_gate_1]
switch_pin: ^ace:PA6
pause_on_runout: False
event_delay: 0.5

[filament_switch_sensor mmu_gate_2]
switch_pin: ^ace:PC6
pause_on_runout: False
event_delay: 0.5

[filament_switch_sensor mmu_gate_3]
switch_pin: ^ace:PC7
pause_on_runout: False
event_delay: 0.5

# ---------------------------------------------------------------------------
# Bring-up helpers
# ---------------------------------------------------------------------------
[gcode_macro ACE_GEAR_TEST]
description: Slow FEED jog then disable (stall-friendly)
gcode:
    {% set DIST = params.DIST|default(2)|float %}
    {% set SPEED = params.SPEED|default(5)|float %}
    MANUAL_STEPPER STEPPER=mmu_gear ENABLE=1
    G4 P100
    MANUAL_STEPPER STEPPER=mmu_gear SET_POSITION=0
    MANUAL_STEPPER STEPPER=mmu_gear MOVE={DIST} SPEED={SPEED} ACCEL=60
    M400
    G4 P200
    MANUAL_STEPPER STEPPER=mmu_gear ENABLE=0
    RESPOND MSG="mmu_gear {DIST}mm @{SPEED} — if clicks, raise X Vref slightly or free belt"

[gcode_macro ACE_SEL_TEST]
description: Jog SEL on ace:Z then disable
gcode:
    {% set DIST = params.DIST|default(2)|float %}
    {% set SPEED = params.SPEED|default(10)|float %}
    MANUAL_STEPPER STEPPER=mmu_selector ENABLE=1
    MANUAL_STEPPER STEPPER=mmu_selector SET_POSITION=0
    MANUAL_STEPPER STEPPER=mmu_selector MOVE={DIST} SPEED={SPEED}
    M400
    G4 P200
    MANUAL_STEPPER STEPPER=mmu_selector ENABLE=0
    RESPOND MSG="mmu_selector moved {DIST} mm @ {SPEED} — disabled"

[gcode_macro ACE_ZERO_QUERY]
description: Print ZERO / mmu_selector endstop state (watch Mainsail console)
gcode:
    QUERY_ENDSTOPS
    RESPOND MSG="mmu_selector: open|TRIGGERED (PA7). Unplug=open / plug=TRIGGERED is OK. Need flip while PLUGGED when flag/magnet passes. Sensor 5V from BL_T V if Z-STOP has no V."

[gcode_macro ACE_SENSOR_QUERY]
description: Print ACE gate sensor states (+ ZERO via QUERY_ENDSTOPS)
gcode:
    {% set s0 = printer['filament_switch_sensor mmu_gate_0'].filament_detected %}
    {% set s1 = printer['filament_switch_sensor mmu_gate_1'].filament_detected %}
    {% set s2 = printer['filament_switch_sensor mmu_gate_2'].filament_detected %}
    {% set s3 = printer['filament_switch_sensor mmu_gate_3'].filament_detected %}
    RESPOND MSG="gates 0..3: {s0},{s1},{s2},{s3}"
    ACE_ZERO_QUERY

[gcode_macro ACE_SEL_SPIN]
description: Force selector both directions (no endstop) — proves motor reverse works
gcode:
    {% set D = params.DIST|default(25)|float %}
    {% set SPEED = params.SPEED|default(8)|float %}
    RESPOND MSG="SPIN +{D} then -{D} (ignore ZERO)"
    MANUAL_STEPPER STEPPER=mmu_selector ENABLE=1
    MANUAL_STEPPER STEPPER=mmu_selector SET_POSITION=0
    MANUAL_STEPPER STEPPER=mmu_selector MOVE={D} SPEED={SPEED}
    M400
    RESPOND MSG="halfway — reversing..."
    MANUAL_STEPPER STEPPER=mmu_selector MOVE=-{D} SPEED={SPEED}
    M400
    MANUAL_STEPPER STEPPER=mmu_selector ENABLE=0
    RESPOND MSG="SPIN done — you must see TWO directions"

[gcode_macro ACE_SEL_HOME]
description: Force leave then home to ZERO (both directions every run)
gcode:
    {% set DIST = params.DIST|default(80)|float %}
    {% set AWAY = params.AWAY|default(40)|float %}
    {% set SPEED = params.SPEED|default(6)|float %}
    RESPOND MSG="HOME: force leave -{AWAY} then hit +{DIST} (endstop). Two spins every time."
    MANUAL_STEPPER STEPPER=mmu_selector ENABLE=1
    G4 P200
    MANUAL_STEPPER STEPPER=mmu_selector SET_POSITION=0
    QUERY_ENDSTOPS
    # 1) Always leave — plain move (endstop leave skips if already open = no spin)
    RESPOND MSG="1/2 LEAVE force -{AWAY}"
    MANUAL_STEPPER STEPPER=mmu_selector MOVE=-{AWAY} SPEED={SPEED}
    M400
    G4 P200
    QUERY_ENDSTOPS
    # 2) Approach home until TRIGGERED (opposite direction)
    RESPOND MSG="2/2 HIT +{DIST} STOP_ON_ENDSTOP=1"
    MANUAL_STEPPER STEPPER=mmu_selector SET_POSITION=0
    MANUAL_STEPPER STEPPER=mmu_selector MOVE={DIST} SPEED={SPEED} STOP_ON_ENDSTOP=1
    M400
    MANUAL_STEPPER STEPPER=mmu_selector SET_POSITION=0
    MANUAL_STEPPER STEPPER=mmu_selector ENABLE=0
    QUERY_ENDSTOPS
    RESPOND MSG="Done — open after leave, TRIGGERED after hit. Tune AWAY if overshoot."
