# ACE Pro Gen1 dryer on [mcu ace] Neo
#
# Fans: ACE FAN1/FAN2 → Neo K-FAN1/K-FAN2 (shared PA0 MOSFET)
# Heater 1 + Thermistor 1: Neo HE0 (PA1) + TH0 (PC5)
# Heater 2 + Thermistor 2: Neo HB  (PA2) + TB  (PC4)
#
# Heaters are open-loop PWM (no heater-verify fault). NTCs are chamber air only.
# Do NOT power FilamentBox for this path.

# ---------------------------------------------------------------------------
# Dual blowers (K-FAN1 + K-FAN2 → ace:PA0)
# ---------------------------------------------------------------------------
[fan_generic ace_dryer_fan]
pin: ace:PA0
max_power: 1.0
shutdown_speed: 0
kick_start_time: 0.5
off_below: 0.05

# ---------------------------------------------------------------------------
# Thermistor 1 (Neo TH0) / Thermistor 2 (Neo TB)
# ---------------------------------------------------------------------------
[temperature_sensor ace_thermistor1]
sensor_type: Generic 3950
sensor_pin: ace:PC5
min_temp: -20
max_temp: 120

[temperature_sensor ace_thermistor2]
sensor_type: Generic 3950
sensor_pin: ace:PC4
min_temp: -20
max_temp: 120

# ---------------------------------------------------------------------------
# Heater 1 / Heater 2 — Neo non-polar 24V heater SCREW headers (not fan plugs)
#
#   ace_heater1 → silk HE0 / E0 / extruder heater block  → MCU PA1
#   ace_heater2 → silk HB  / BED heater block            → MCU PA2
#
# No +/− on silk: one stud is +24V rail, other is MOSFET→GND. PTC either way.
# Open-loop PWM (no heater-verify fault).
# ---------------------------------------------------------------------------
[output_pin ace_heater1]
pin: ace:PA1
pwm: True
cycle_time: 0.1
hardware_pwm: False
value: 0
scale: 1.0
shutdown_value: 0

[output_pin ace_heater2]
pin: ace:PA2
pwm: True
cycle_time: 0.1
hardware_pwm: False
value: 0
scale: 1.0
shutdown_value: 0

# ---------------------------------------------------------------------------
# Bring-up
# ---------------------------------------------------------------------------
[gcode_macro ACE_FAN_TEST]
description: Ramp both ACE dryer blowers (Neo K-FAN1+K-FAN2 / PA0) then off
gcode:
    RESPOND MSG="ace_dryer_fan — K-FAN1+K-FAN2 (PA0). Both should spin together."
    SET_FAN_SPEED FAN=ace_dryer_fan SPEED=0
    G4 P500
    SET_FAN_SPEED FAN=ace_dryer_fan SPEED=0.25
    G4 P2000
    SET_FAN_SPEED FAN=ace_dryer_fan SPEED=0.5
    G4 P2000
    SET_FAN_SPEED FAN=ace_dryer_fan SPEED=1.0
    G4 P3000
    SET_FAN_SPEED FAN=ace_dryer_fan SPEED=0
    RESPOND MSG="ACE_FAN_TEST done — both silent? check 24V + polarity on K-FAN1/K-FAN2"

[gcode_macro ACE_FAN]
description: Set ACE dryer fans speed (0-255). ACE_FAN S=128
gcode:
    {% set S = params.S|default(0)|int %}
    {% set spd = [S / 255.0, 1.0]|min %}
    SET_FAN_SPEED FAN=ace_dryer_fan SPEED={spd}
    RESPOND MSG="ace_dryer_fan {S}/255 (K-FAN1+K-FAN2)"

[gcode_macro ACE_DRYER_ON]
description: Fans full + heaters at POWER (default 0.75). ACE_DRYER_ON POWER=0.75
gcode:
    {% set POWER = params.POWER|default(0.75)|float %}
    {% set P = [[POWER, 0.0]|max, 1.0]|min %}
    SET_FAN_SPEED FAN=ace_dryer_fan SPEED=1.0
    SET_PIN PIN=ace_heater1 VALUE={P}
    SET_PIN PIN=ace_heater2 VALUE={P}
    RESPOND MSG="ACE_DRYER_ON fans=100% heater1={P} heater2={P} (open-loop; watch temps)"

[gcode_macro ACE_HEATER1]
description: Set heater1 PWM 0-1. ACE_HEATER1 POWER=0.75
gcode:
    {% set P = [[params.POWER|default(0)|float, 0.0]|max, 1.0]|min %}
    SET_PIN PIN=ace_heater1 VALUE={P}
    RESPOND MSG="ace_heater1 POWER={P}"

[gcode_macro ACE_HEATER2]
description: Set heater2 PWM 0-1. ACE_HEATER2 POWER=0.75
gcode:
    {% set P = [[params.POWER|default(0)|float, 0.0]|max, 1.0]|min %}
    SET_PIN PIN=ace_heater2 VALUE={P}
    RESPOND MSG="ace_heater2 POWER={P}"

[gcode_macro ACE_DRYER_OFF]
description: Dryer fans + heater1 + heater2 off
gcode:
    SET_PIN PIN=ace_heater1 VALUE=0
    SET_PIN PIN=ace_heater2 VALUE=0
    SET_FAN_SPEED FAN=ace_dryer_fan SPEED=0
    RESPOND MSG="ACE dryer: fans off, heater1 off, heater2 off"
