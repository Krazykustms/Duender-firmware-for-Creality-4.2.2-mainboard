# Reference-only Duender CoreXY overlay for Creality 4.2.2 pins.
# Use ONLY if the Duender GD32 Neo mainboard is converted to Klipper
# (replaces Marlin). Not for spare RCT6 bring-up.
#
# Merge into printer.cfg after MCU serial works: replace [printer] and
# stepper soft limits; keep CR Touch / Sprite notes from docs/wiring.md.

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000
max_z_velocity: 10
max_z_accel: 100

# Marlin 100 steps/mm @ 16 microsteps → rotation_distance 40
[stepper_x]
rotation_distance: 40
dir_pin: !PB9
position_min: 0
position_endstop: 0
position_max: 201
homing_speed: 50

[stepper_y]
rotation_distance: 40
dir_pin: !PB7
position_min: 0
position_endstop: 0
position_max: 235
homing_speed: 50

[stepper_z]
# CR Touch on Z_MIN (PA7) — configure bltouch + probe; do not home on switch
rotation_distance: 8
position_max: 250

[extruder]
# Sprite / T13-style sensor — verify your thermistor:
# sensor_type: Generic 3950
rotation_distance: 7.5
# Calibrate: previous Marlin ~433.57 e-steps → tune rotation_distance

# Example CR Touch (wire to BLTouch header: servo PB0, sense PA7)
# [bltouch]
# sensor_pin: ^PA7
# control_pin: PB0
# x_offset: -31.0
# y_offset: -39.0
# z_offset: 0.0
#
# [safe_z_home]
