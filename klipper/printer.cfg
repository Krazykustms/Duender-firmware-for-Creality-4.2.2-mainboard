# Duender CoreXY — Creality 4.2.2 STM32F103RCT6 (spare board) + BTT Pi
# Pin map: Creality V4 / printer-creality-ender3-v2-2020
# Serial: CH340 USB from board → Pi
#
# Hardware switch: unplug Marlin GD32 Neo board; move the SAME connectors
# (motors X/Y/Z-parallel/E, endstops, CR Touch, heaters, thermistors, fans)
# onto this Klipper STM32 4.2.2. USB from this board to BTT Pi.

[include mainsail.cfg]
[include calibrations.cfg]
[include macros.cfg]
[include ace_validate.cfg]

# ACE mechanics MMU — Neo GD32 as [mcu ace] (see ace_mmu.cfg)
[include ace_mmu.cfg]
[include ace_dryer.cfg]
# [include ace_toolhead.cfg]
# Happy Hare later: [include mmu/base/*.cfg] (see ace_mmu_happy_hare.md)

# Host MCU unused (ADXL/Pi GPIO later). Was causing 50↔49 MHz clock errors.
# [mcu CB1]
# serial: /tmp/klipper_host_mcu

# Both boards are CH340 with identical USB ids — lock by USB controller path
[mcu]
serial: /dev/serial/by-path/platform-5101400.usb-usb-0:1:1.0-port0
restart_method: command

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000
max_z_velocity: 10
max_z_accel: 100
square_corner_velocity: 5.0

# --- Motion (Marlin: 100,100,400, ~433.57 e-steps @ 16 µsteps) ---
# rotation_distance = 200*16 / steps_per_mm

[stepper_x]
step_pin: PC2
dir_pin: !PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 31.53
endstop_pin: ^PA5
position_endstop: 0
position_min: 0
position_max: 201
homing_speed: 50
homing_retract_dist: 5

[stepper_y]
step_pin: PB8
dir_pin: !PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 31.53
endstop_pin: ^PA6
position_endstop: 0
position_min: 0
position_max: 235
homing_speed: 50
homing_retract_dist: 5

[stepper_z]
step_pin: PB6
# Bed must move UP toward CR Touch during Z home (was !PB5 → wrong way)
dir_pin: PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -2
position_max: 250
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 3

[extruder]
max_extrude_only_distance: 150.0
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
# ~433.57 e-steps/mm → rotation_distance ≈ 7.38; fine-tune after switch
rotation_distance: 7.38
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
# Sprite / T13 (Generic 3950)
sensor_type: Generic 3950
sensor_pin: PC5
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 285
min_extrude_temp: 170
pressure_advance: 0.0
pressure_advance_smooth_time: 0.040

[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
#control: pid
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182
min_temp: 0
max_temp: 120

[fan]
pin: PA0

# Part-cooling is often FAN0; hotend fan may be always-on on 4.2.2 hardware

[bltouch]
# Creality CR Touch on BL_T 5-pin (Marlin pins_CREALITY_V4.h):
#   SERVO0_PIN PB0 = control, Z_MIN_PROBE_PIN PB1 = sense
#   Z_STOP_PIN PA7 = mechanical Z endstop only — NOT the BL_T sense wire
sensor_pin: ^PB1
control_pin: PB0
x_offset: -31.0
y_offset: -39.0
#z_offset: 0.0
pin_move_time: 0.680
probe_with_touch_mode: True
# CR Touch: stowed “active”; skip raise-verify that expects BLTouch open-when-up
pin_up_reports_not_triggered: False
pin_up_touch_mode_reports_triggered: False
stow_on_each_sample: True
speed: 5
samples: 2
sample_retract_dist: 3.0
lift_speed: 10
samples_tolerance_retries: 3

# Ensure pin is stowed after connect (default idle is UP / retracted)
[delayed_gcode CRTOUCH_STOW_AT_START]
initial_duration: 2.0
gcode:
    BLTOUCH_DEBUG COMMAND=reset
    G4 P300
    BLTOUCH_DEBUG COMMAND=pin_up

[safe_z_home]
home_xy_position: 101, 129
speed: 100
z_hop: 10
z_hop_speed: 5

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 10, 23
mesh_max: 170, 196
probe_count: 5, 5
algorithm: bicubic

[idle_timeout]
timeout: 1800

